<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yaş ve Öğrencilik Durumu Kontrolü</title>
</head>

<body>

    <script>

        let yasGirdisi = prompt("Lütfen yaşınızı giriniz:");
        let yas = Number(yasGirdisi);

        if (isNaN(yas) || yasGirdisi === null || yasGirdisi.trim() === "") {
            alert("Geçerli bir yaş giriniz!");
        }
        else {

            if (yas < 18) {
                alert("Reşit değilsiniz.");
            }

            else {

                let ogrenciMi = confirm("Öğrenci misiniz?");

                if (ogrenciMi) {
                    alert("Hoşgeldiniz öğrenci!");
                }

                else {
                    alert("Hoşgeldiniz!");
                }
            }
        }
    </script>

</body>

</html>
